<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Edit Employee</title>
    <style>
        :root {
            --bg: #f8fafc;
            --ink: #0f172a;
            --muted: #64748b;
            --accent: #1e40af;
            --accent-light: #3b82f6;
            --card: rgba(255,255,255,0.98);
            --shadow: 0 6px 18px rgba(15,23,42,.08);
            --radius: 20px;
            --transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
            min-height: 100vh;
            color: var(--ink);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 85% 30%, rgba(96, 165, 250, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 50% 80%, rgba(30, 64, 175, 0.2) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233b82f6' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Sidebar */
        .side {
            padding: 32px 20px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: 4px 0 24px rgba(30, 64, 175, 0.1);
            animation: fadeIn 0.6s ease-out;
        }

        .brand {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand::before {
            content: '';
            width: 8px;
            height: 32px;
            background: linear-gradient(180deg, #3b82f6 0%, #1e40af 100%);
            border-radius: 4px;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
        }

        .nav h5 {
            margin: 24px 0 12px;
            color: var(--muted);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav h5::before {
            content: '';
            width: 3px;
            height: 12px;
            background: linear-gradient(180deg, #3b82f6, #1e40af);
            border-radius: 2px;
        }

        .nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--ink);
            padding: 14px 16px;
            border-radius: 16px;
            margin: 6px 0;
            background: white;
            border: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
            transition: var(--transition);
            font-weight: 500;
        }

        .nav a:hover {
            transform: translateX(4px);
            background: rgba(59, 130, 246, 0.05);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }

        .nav a.active {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            font-weight: 700;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
        }

        /* Main */
        .main {
            padding: 48px;
            animation: fadeIn 0.6s ease-out 0.2s both;
            max-width: 1400px;
        }

        .heading {
            margin-bottom: 40px;
        }

        .heading h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 8px;
        }

        .heading h2::before {
            content: '';
            width: 6px;
            height: 48px;
            background: linear-gradient(180deg, #60a5fa, #3b82f6);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        }

        .heading .muted {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            margin-left: 22px;
        }

        .heading .muted b {
            color: white;
            font-weight: 700;
        }

        /* Card */
        .card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(30, 64, 175, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        /* Sections */
        .section {
            margin-bottom: 40px;
            padding-bottom: 40px;
            border-bottom: 2px solid rgba(59, 130, 246, 0.1);
        }

        .section:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section h3 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--ink);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section h3::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #3b82f6 0%, #1e40af 100%);
            border-radius: 4px;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        .field.col-span-2 {
            grid-column: 1 / -1;
        }

        .field span {
            color: var(--ink);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .field input,
        .field select {
            padding: 14px 16px;
            border: 2px solid rgba(59, 130, 246, 0.15);
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transition);
            background: white;
            font-family: inherit;
            color: var(--ink);
        }

        .field input:focus,
        .field select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .field select {
            cursor: pointer;
        }

        /* Actions */
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid rgba(59, 130, 246, 0.1);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .btn.ghost {
            background: rgba(15, 23, 42, 0.05);
            color: var(--ink);
            border: 2px solid rgba(15, 23, 42, 0.1);
        }

        .btn.ghost:hover {
            background: rgba(15, 23, 42, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.1);
        }

        .btn.primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
        }

        .btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(59, 130, 246, 0.45);
        }

        @media (max-width: 1024px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .side {
                border-right: none;
                border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            }

            .main {
                padding: 32px 24px;
            }

            .heading h2 {
                font-size: 2rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .field.col-span-2 {
                grid-column: 1;
            }

            .actions {
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="layout">
    <!-- Sidebar -->
    <aside class="side">
        <div class="brand">Admin</div>

        <nav class="nav">
            <h5>People</h5>
            <a th:href="@{/admin/employees}" class="active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Employees
            </a>
            <a th:href="@{/admin/departments}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Departments
            </a>

            <h5>Me</h5>
            <a th:href="@{/account/profile}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                My Profile
            </a>
            <a th:href="@{/logout}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
                </svg>
                Logout
            </a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="heading">
            <h2>Edit Employee</h2>
            <span class="muted">ID <span th:text="${emp.id}">0</span> — <b th:text="${emp.username}">username</b></span>
        </div>

        <form th:action="@{'/admin/employees/' + ${emp.id} + '/edit'}"
              th:object="${employeeAdminUpdateDto}" method="post" class="card form">

            <div class="section">
                <h3>Personal Information</h3>
                <div class="grid">
                    <label class="field">
                        <span>First Name</span>
                        <input th:field="*{firstName}" placeholder="First name"/>
                    </label>
                    <label class="field">
                        <span>Last Name</span>
                        <input th:field="*{lastName}" placeholder="Last name"/>
                    </label>
                    <label class="field">
                        <span>Email</span>
                        <input th:field="*{email}" type="email" placeholder="name@company.com" required/>
                    </label>
                    <label class="field">
                        <span>NIC</span>
                        <input th:field="*{nic}" placeholder="NIC"/>
                    </label>
                    <label class="field">
                        <span>City</span>
                        <input th:field="*{city}" placeholder="City"/>
                    </label>
                    <label class="field">
                        <span>Postal Code</span>
                        <input th:field="*{postalCode}" placeholder="Postal Code"/>
                    </label>
                    <label class="field col-span-2">
                        <span>Street</span>
                        <input th:field="*{street}" placeholder="Street address"/>
                    </label>
                </div>
            </div>

            <div class="section">
                <h3>Employment Details</h3>
                <div class="grid">
                    <label class="field">
                        <span>Hire Date</span>
                        <input type="date" th:field="*{hireDate}"/>
                    </label>
                    <label class="field">
                        <span>Position</span>
                        <input th:field="*{position}" placeholder="Position"/>
                    </label>

                    <label class="field">
                        <span>Department</span>
                        <select th:field="*{deptId}">
                            <option th:value="${null}">-- Select Department --</option>
                            <option th:each="d : ${departments}"
                                    th:value="${d.id}"
                                    th:text="${d.deptName}"
                                    th:selected="${emp.department != null and d.id == emp.department.id}">
                            </option>
                        </select>
                    </label>

                    <label class="field">
                        <span>Status</span>
                        <input th:field="*{status}" placeholder="ACTIVE"/>
                    </label>

                    <label class="field col-span-2">
                        <span>Access Type</span>
                        <select th:field="*{accessType}">
                            <option value="EMPLOYEE">EMPLOYEE</option>
                            <option value="HR">HR</option>
                            <option value="FINANCE">FINANCE</option>
                            <option value="SUPERUSER">SUPERUSER</option>
                        </select>
                    </label>
                </div>
            </div>

            <div class="actions">
                <a th:href="@{/admin/employees}" class="btn ghost">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to list
                </a>
                <button type="submit" class="btn primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Save Changes
                </button>
            </div>
        </form>
    </main>
</div>
</body>
</html>
