<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>My Performance</title>
    <style>
        :root {
            --bg: #f8fafc;
            --ink: #0f172a;
            --muted: #64748b;
            --accent: #1e40af;
            --accent-light: #eef2ff;
            --card: #ffffff;
            --shadow: 0 8px 24px rgba(15, 23, 42, .08);
            --radius: 22px;
            --transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
            min-height: 100vh;
            color: var(--ink);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
            padding: 28px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 85% 30%, rgba(96, 165, 250, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 50% 80%, rgba(30, 64, 175, 0.2) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233b82f6' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0 0 24px;
            background: linear-gradient(135deg, #fff 0%, #bae6fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 0.6s ease-out;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(30, 64, 175, 0.15), 0 0 0 1px rgba(59, 130, 246, 0.1);
            padding: 32px;
            animation: fadeIn 0.6s ease-out 0.1s both;
            border: 1px solid rgba(59, 130, 246, 0.1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th,
        td {
            padding: 14px 12px;
            text-align: left;
        }

        thead {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(30, 64, 175, 0.05) 100%);
        }

        th {
            font-weight: 700;
            color: var(--ink);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 2px solid rgba(59, 130, 246, 0.2);
        }

        tbody tr {
            background: white;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            transition: var(--transition);
        }

        tbody tr:hover {
            background: rgba(59, 130, 246, 0.03);
            transform: scale(1.001);
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        td {
            color: var(--ink);
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn.ghost {
            background: rgba(241, 245, 249, 0.8);
            color: var(--ink);
            border: 1px solid rgba(59, 130, 246, 0.1);
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .btn.ghost:hover {
            background: rgba(226, 232, 240, 0.9);
            transform: translateY(-1px);
        }

        .actions {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(226, 232, 240, 0.6);
            text-align: right;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 12px;
            }

            h2 {
                font-size: 1.5rem;
            }

            .card {
                padding: 24px 20px;
            }

            .table-wrapper {
                overflow-x: scroll;
            }

            th,
            td {
                padding: 12px 8px;
                font-size: 0.85rem;
            }

            .actions {
                text-align: center;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h2>My Performance</h2>

    <div class="card">
        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Attendance</th>
                    <th>Teamwork</th>
                    <th>Task Completion</th>
                    <th>Average</th>
                    <th>Comments</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${evaluations}">
                    <td th:text="${p.evaluationDate}">2025-01-01</td>
                    <td th:text="${p.attendanceScore}">5</td>
                    <td th:text="${p.teamworkScore}">4</td>
                    <td th:text="${p.taskCompletionScore}">5</td>
                    <td th:text="${#numbers.formatDecimal((p.attendanceScore + p.teamworkScore + p.taskCompletionScore)/3.0, 1, 1)}">4.7</td>
                    <td th:text="${p.comments ?: '—'}">Excellent</td>
                </tr>
                <tr th:if="${#lists.isEmpty(evaluations)}">
                    <td colspan="6" style="text-align:center;color:var(--muted);padding:24px">No performance evaluations yet.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="actions">
            <a th:href="@{/}" class="btn ghost">Back to Dashboard</a>
        </div>
    </div>
</div>
</body>
</html>
