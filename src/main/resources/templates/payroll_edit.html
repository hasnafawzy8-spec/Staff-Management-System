<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Edit Payroll</title>
    <style>
        :root {
            --bg: #f8fafc;
            --ink: #0f172a;
            --muted: #64748b;
            --accent: #1e40af;
            --card: #ffffff;
            --shadow: 0 8px 24px rgba(15, 23, 42, .08);
            --radius: 22px;
            --transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
            min-height: 100vh;
            color: var(--ink);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
            padding: 32px 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 85% 30%, rgba(96, 165, 250, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 50% 80%, rgba(30, 64, 175, 0.2) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233b82f6' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0 0 24px;
            background: linear-gradient(135deg, #fff 0%, #bae6fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 0.6s ease-out;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(30, 64, 175, 0.15), 0 0 0 1px rgba(59, 130, 246, 0.1);
            padding: 32px;
            animation: fadeIn 0.6s ease-out 0.1s both;
            border: 1px solid rgba(59, 130, 246, 0.1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        .error-message {
            color: #ef4444;
            font-weight: 600;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 10px;
            margin-bottom: 16px;
            border-left: 3px solid #ef4444;
        }

        .info-text {
            margin: 0 0 20px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(30, 64, 175, 0.05) 100%);
            border-radius: 12px;
            color: var(--ink);
            border: 1px solid rgba(59, 130, 246, 0.15);
        }

        .info-text strong {
            color: #1e40af;
        }

        label {
            display: block;
            margin-bottom: 18px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--ink);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin-top: 6px;
            border: 2px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.9);
            transition: var(--transition);
            outline: none;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: white;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 8px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn.primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
        }

        .btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(59, 130, 246, 0.45);
        }

        .btn.ghost {
            background: rgba(241, 245, 249, 0.8);
            color: var(--ink);
            border: 1px solid rgba(59, 130, 246, 0.1);
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .btn.ghost:hover {
            background: rgba(226, 232, 240, 0.9);
            transform: translateY(-1px);
        }

        .button-group {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(226, 232, 240, 0.6);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Error popup styles */
        .error-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(239, 68, 68, 0.3), 0 0 0 1px rgba(239, 68, 68, 0.2);
            z-index: 10000;
            max-width: 450px;
            width: 90%;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .error-popup.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: all;
        }

        .error-popup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ef4444, #dc2626);
            border-radius: 20px 20px 0 0;
        }

        .error-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(3px);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .error-popup-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .error-popup-content {
            margin-top: 16px;
            font-weight: 600;
            color: #b91c1c;
            font-size: 1.1rem;
            text-align: center;
        }

        .error-popup button {
            margin-top: 24px;
            background: #ef4444;
            border: none;
            color: white;
            padding: 10px 28px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .error-popup button:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Edit Payroll</h2>
    <div class="card">
        <form th:action="@{'/admin/payrolls/' + ${record.id} + '/edit'}" th:object="${record}" method="post" onsubmit="return validateEditForm(this)" novalidate>
            <p class="info-text">
                Fields marked <strong>*</strong> are mandatory.
            </p>
            <div class="row">
                <label for="periodMonth">Month *</label>
                <input id="periodMonth" type="number" name="periodMonth" min="1" max="12" placeholder="Month (1-12)"
                       th:value="${record.periodMonth}" required />
            </div>
            <div class="row">
                <label for="periodYear">Year *</label>
                <input id="periodYear" type="number" name="periodYear" min="2000" max="2100" placeholder="Year (e.g. 2023)"
                       th:value="${record.periodYear}" required />
            </div>
            <div class="row">
                <label for="basicSalary">Basic Salary *</label>
                <input id="basicSalary" type="number" name="basicSalary" min="0" step="0.01" placeholder="Basic Salary"
                       th:value="${record.basicSalary}" required />
            </div>
            <div class="row">
                <label for="overtimeRate">Overtime Rate</label>
                <input id="overtimeRate" type="number" name="overtimeRate" min="0" step="0.01" placeholder="Overtime Rate"
                       th:value="${record.overtimeRate}" />
            </div>
            <div class="row">
                <label for="allowances">Allowances</label>
                <input id="allowances" type="number" name="allowances" min="0" step="0.01" placeholder="Allowances"
                       th:value="${record.allowances}" />
            </div>
            <div class="row">
                <label for="deductions">Deductions</label>
                <input id="deductions" type="number" name="deductions" min="0" step="0.01" placeholder="Deductions"
                       th:value="${record.deductions}" />
            </div>

            <div class="button-group">
                <button type="submit" class="btn primary">Save</button>
                <a href="/admin/payrolls" class="btn ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>

<!-- Error Popup -->
<div id="errorPopupOverlay" class="error-popup-overlay"></div>
<div id="errorPopup" class="error-popup" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="error-popup-content" id="errorPopupMessage"></div>
    <button type="button" onclick="hideErrorPopup()">OK</button>
</div>

<script>
    function showErrorPopup(message) {
        const popup = document.getElementById('errorPopup');
        const overlay = document.getElementById('errorPopupOverlay');
        const msg = document.getElementById('errorPopupMessage');

        msg.textContent = message;
        popup.classList.add('show');
        overlay.classList.add('show');

        // Focus OK button for accessibility
        popup.querySelector('button').focus();
    }

    function hideErrorPopup() {
        const popup = document.getElementById('errorPopup');
        const overlay = document.getElementById('errorPopupOverlay');

        popup.classList.remove('show');
        overlay.classList.remove('show');
    }

    function validateEditForm(form) {
        const month = form.elements['periodMonth'];
        const year = form.elements['periodYear'];
        const basicSalary = form.elements['basicSalary'];
        const overtimeRate = form.elements['overtimeRate'];
        const allowances = form.elements['allowances'];
        const deductions = form.elements['deductions'];

        if (!month.value) {
            showErrorPopup('Month is required!');
            month.focus();
            return false;
        }
        if (month.value < 1 || month.value > 12) {
            showErrorPopup('Month must be between 1 and 12.');
            month.focus();
            return false;
        }

        if (!year.value) {
            showErrorPopup('Year is required!');
            year.focus();
            return false;
        }
        if (year.value < 2000 || year.value > 2100) {
            showErrorPopup('Year must be between 2000 and 2100.');
            year.focus();
            return false;
        }

        if (!basicSalary.value) {
            showErrorPopup('Basic Salary is required!');
            basicSalary.focus();
            return false;
        }
        if (basicSalary.value < 0) {
            showErrorPopup('Basic Salary must be a non-negative number.');
            basicSalary.focus();
            return false;
        }

        if (overtimeRate.value && overtimeRate.value < 0) {
            showErrorPopup('Overtime Rate must be a non-negative number.');
            overtimeRate.focus();
            return false;
        }

        if (allowances.value && allowances.value < 0) {
            showErrorPopup('Allowances must be a non-negative number.');
            allowances.focus();
            return false;
        }

        if (deductions.value && deductions.value < 0) {
            showErrorPopup('Deductions must be a non-negative number.');
            deductions.focus();
            return false;
        }

        return true;
    }
</script>
</body>
</html>
