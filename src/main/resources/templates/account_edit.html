<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Edit My Details</title>
    <style>
        :root {
            --bg: #f8fafc;
            --ink: #0f172a;
            --muted: #64748b;
            --accent: #1e40af;
            --accent-light: #3b82f6;
            --card: rgba(255,255,255,0.98);
            --shadow: 0 6px 18px rgba(15,23,42,.08);
            --radius: 20px;
            --transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
            min-height: 100vh;
            color: var(--ink);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 85% 30%, rgba(96, 165, 250, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 50% 80%, rgba(30, 64, 175, 0.2) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233b82f6' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Sidebar */
        .side {
            padding: 32px 20px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: 4px 0 24px rgba(30, 64, 175, 0.1);
            animation: fadeIn 0.6s ease-out;
        }

        .brand {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand::before {
            content: '';
            width: 8px;
            height: 32px;
            background: linear-gradient(180deg, #3b82f6 0%, #1e40af 100%);
            border-radius: 4px;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
        }

        .user-info {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 24px;
            color: white;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }

        .user-info .username {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .user-info .detail {
            font-size: 0.85rem;
            opacity: 0.9;
            margin: 2px 0;
        }

        .nav h5 {
            margin: 24px 0 12px;
            color: var(--muted);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav h5::before {
            content: '';
            width: 3px;
            height: 12px;
            background: linear-gradient(180deg, #3b82f6, #1e40af);
            border-radius: 2px;
        }

        .nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--ink);
            padding: 14px 16px;
            border-radius: 16px;
            margin: 6px 0;
            background: white;
            border: 1px solid rgba(59, 130, 246, 0.1);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
            transition: var(--transition);
            font-weight: 500;
        }

        .nav a:hover {
            transform: translateX(4px);
            background: rgba(59, 130, 246, 0.05);
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }

        .nav a.active {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            font-weight: 700;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
        }

        /* Main */
        .main {
            padding: 48px;
            animation: fadeIn 0.6s ease-out 0.2s both;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .header h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header h2::before {
            content: '';
            width: 6px;
            height: 48px;
            background: linear-gradient(180deg, #60a5fa, #3b82f6);
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
        }

        .badge {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
            white-space: nowrap;
        }

        /* Info Card */
        .info-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 20px 60px rgba(30, 64, 175, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.1);
            position: relative;
            overflow: hidden;
        }

        .info-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .info-item label {
            display: block;
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .info-item .value {
            font-weight: 700;
            font-size: 1rem;
            color: var(--ink);
        }

        /* Form Card */
        .form-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(30, 64, 175, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.1);
            position: relative;
            overflow: hidden;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        .form-group label {
            color: var(--ink);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input {
            padding: 14px 16px;
            border: 2px solid rgba(59, 130, 246, 0.15);
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transition);
            background: white;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 2px solid rgba(59, 130, 246, 0.1);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .btn-secondary {
            background: rgba(15, 23, 42, 0.05);
            color: var(--ink);
            border: 2px solid rgba(15, 23, 42, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(15, 23, 42, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(59, 130, 246, 0.45);
        }

        @media (max-width: 1024px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .side {
                border-right: none;
                border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            }

            .main {
                padding: 32px 24px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .header h2 {
                font-size: 2rem;
            }

            .form-grid, .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="layout">
    <!-- Sidebar -->
    <aside class="side">
        <div class="brand">Account</div>

        <div class="user-info">
            <div class="username" th:text="${emp.username}">jdoe</div>
            <div class="detail" th:text="${(emp.firstName?:'') + ' ' + (emp.lastName?:'')}">John Doe</div>
            <div class="detail" th:text="${emp.email?:'—'}">john@company.com</div>
            <div class="detail" th:text="${emp?.department?.deptName} ?: '—'">Department</div>
        </div>

        <nav class="nav">
            <h5>Account</h5>
            <a th:href="@{/account/edit}" class="active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                Edit My Details
            </a>
            <a th:href="@{/password/reset}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                Change My Password
            </a>
            <a th:href="@{/logout}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
                </svg>
                Logout
            </a>

            <h5>My Actions</h5>
            <a th:href="@{/attendance}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                </svg>
                My Attendance
            </a>
            <a th:href="@{/leaves}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
                </svg>
                My Leave Requests
            </a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="header">
            <h2>Edit My Details</h2>
            <span class="badge" th:text="${emp.accessType}">EMPLOYEE</span>
        </div>

        <!-- Info Card -->
        <section class="info-card">
            <div class="info-grid">
                <div class="info-item">
                    <label>Username</label>
                    <div class="value" th:text="${emp.username}">jdoe</div>
                </div>
                <div class="info-item">
                    <label>Position</label>
                    <div class="value" th:text="${emp.position?:'—'}">—</div>
                </div>
                <div class="info-item">
                    <label>Hire Date</label>
                    <div class="value" th:text="${emp.hireDate?:'—'}">—</div>
                </div>
                <div class="info-item">
                    <label>Department</label>
                    <div class="value" th:text="${emp?.department?.deptName} ?: '—'">—</div>
                </div>
            </div>
        </section>

        <!-- Editable Form -->
        <section class="form-card">
            <form th:action="@{/account/edit}" th:object="${employeeSelfUpdateDto}" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input id="firstName" th:field="*{firstName}" placeholder="First name"/>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input id="lastName" th:field="*{lastName}" placeholder="Last name"/>
                    </div>
                    <div class="form-group full">
                        <label for="email">Email</label>
                        <input id="email" th:field="*{email}" type="email" placeholder="name@company.com" required/>
                    </div>
                    <div class="form-group">
                        <label for="nic">NIC</label>
                        <input id="nic" th:field="*{nic}" placeholder="NIC"/>
                    </div>
                    <div class="form-group">
                        <label for="city">City</label>
                        <input id="city" th:field="*{city}" placeholder="City"/>
                    </div>
                    <div class="form-group">
                        <label for="postalCode">Postal Code</label>
                        <input id="postalCode" th:field="*{postalCode}" placeholder="Postal Code"/>
                    </div>
                    <div class="form-group full">
                        <label for="street">Street</label>
                        <input id="street" th:field="*{street}" placeholder="Street address"/>
                    </div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/account/profile}" class="btn btn-secondary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        Back
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        Save Changes
                    </button>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
