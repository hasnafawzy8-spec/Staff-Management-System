<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>All Payrolls</title>
    <style>
        :root {
            --bg: #f8fafc;
            --ink: #0f172a;
            --muted: #64748b;
            --accent: #1e40af;
            --accent-light: #eef2ff;
            --card: #ffffff;
            --shadow: 0 8px 24px rgba(15, 23, 42, .08);
            --ring: rgba(37, 99, 235, .25);
            --radius: 22px;
            --transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #1e40af 100%);
            min-height: 100vh;
            color: var(--ink);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    radial-gradient(circle at 15% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 85% 30%, rgba(96, 165, 250, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 50% 80%, rgba(30, 64, 175, 0.2) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%233b82f6' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* Sidebar */
        .side {
            padding: 24px 18px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(59, 130, 246, 0.2);
        }

        .brand {
            font-weight: 700;
            font-size: 1.25rem;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .nav h5 {
            margin: 1rem 0 .4rem;
            color: rgba(186, 230, 253, 0.7);
            font-weight: 600;
            font-size: .78rem;
            text-transform: uppercase;
            letter-spacing: .08em;
        }

        .nav a {
            display: block;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.9);
            padding: 12px 14px;
            border-radius: 12px;
            margin: 6px 0;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: var(--transition);
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .nav a:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateX(4px);
        }

        .nav a.active {
            background: rgba(59, 130, 246, 0.25);
            color: #fff;
            font-weight: 600;
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Main */
        .main {
            padding: 32px;
            max-width: 1600px;
        }

        .heading {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            animation: fadeIn 0.6s ease-out;
        }

        .heading h2 {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #bae6fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Card */
        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(30, 64, 175, 0.15), 0 0 0 1px rgba(59, 130, 246, 0.1);
            padding: 32px;
            margin-bottom: 24px;
            animation: fadeIn 0.6s ease-out 0.1s both;
            border: 1px solid rgba(59, 130, 246, 0.1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        .card h3 {
            margin-top: 0;
            font-size: 1.3rem;
            color: var(--ink);
            font-weight: 700;
        }

        /* Form */
        .form label {
            display: block;
            margin-bottom: 16px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--ink);
        }

        .form input {
            width: 100%;
            padding: 10px 14px;
            margin-top: 6px;
            border: 2px solid rgba(59, 130, 246, 0.2);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.9);
            transition: var(--transition);
            outline: none;
        }

        .form input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: white;
        }

        .form input:invalid {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .hint {
            font-size: 0.8rem;
            color: #64748b;
            display: block;
            margin-top: 4px;
            font-weight: 400;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
            border: none;
            font-family: inherit;
        }

        .btn.primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35);
            margin-top: 16px;
        }

        .btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(59, 130, 246, 0.45);
        }

        .btn.ghost {
            background: rgba(241, 245, 249, 0.8);
            color: var(--ink);
            border: 1px solid rgba(59, 130, 246, 0.1);
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        .btn.ghost:hover {
            background: rgba(226, 232, 240, 0.9);
            transform: translateY(-1px);
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 16px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .table th,
        .table td {
            padding: 14px 12px;
            text-align: left;
        }

        .table thead {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08) 0%, rgba(30, 64, 175, 0.05) 100%);
        }

        .table th {
            font-weight: 700;
            color: var(--ink);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 2px solid rgba(59, 130, 246, 0.2);
        }

        .table tbody tr {
            background: white;
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            transition: var(--transition);
        }

        .table tbody tr:hover {
            background: rgba(59, 130, 246, 0.03);
            transform: scale(1.001);
        }

        .table tbody tr:last-child {
            border-bottom: none;
        }

        .table td {
            color: var(--ink);
        }

        .table td:last-child {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        form {
            display: inline;
        }

        .actions {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(226, 232, 240, 0.6);
        }

        /* Error popup styles */
        .error-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(239, 68, 68, 0.3), 0 0 0 1px rgba(239, 68, 68, 0.2);
            z-index: 10000;
            max-width: 450px;
            width: 90%;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .error-popup.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: all;
        }

        .error-popup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ef4444, #dc2626);
            border-radius: 20px 20px 0 0;
        }

        .error-popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .error-popup-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .error-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(220, 38, 38, 0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 2px solid rgba(239, 68, 68, 0.3);
        }

        .error-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #dc2626;
            text-align: center;
            margin-bottom: 12px;
        }

        .error-message {
            font-size: 1rem;
            color: var(--ink);
            text-align: center;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .error-close-btn {
            width: 100%;
            padding: 12px 24px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .error-close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.4);
        }

        @media (max-width: 880px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .side {
                border-right: none;
                border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            }

            .main {
                padding: 24px 16px;
            }

            .heading {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .heading h2 {
                font-size: 1.5rem;
            }

            .table-wrapper {
                overflow-x: scroll;
            }

            .table th,
            .table td {
                padding: 12px 8px;
                font-size: 0.85rem;
            }

            .table td:last-child {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="layout">
    <!-- Sidebar -->
    <aside class="side">
        <div class="brand">Admin</div>
        <nav class="nav">
            <h5>Payroll</h5>
            <a th:href="@{/admin/payrolls}" class="active">Payrolls</a>
            <a th:href="@{/admin/employees}">Employees</a>
            <a th:href="@{/admin/departments}">Departments</a>

            <h5>Account</h5>
            <a th:href="@{/account/profile}">My Profile</a>
            <a th:href="@{/logout}">Logout</a>
        </nav>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="heading">
            <h2>All Payrolls</h2>
        </div>

        <!-- Quick generate form -->
        <section class="card form">
            <h3>Generate / Update Payroll</h3>
            <form th:action="@{/admin/payrolls/generate}" method="post" novalidate onsubmit="return validatePayrollForm(this)">
                <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>

                <label>Emp ID
                    <input name="empId" type="number" required min="1" step="1" inputmode="numeric"
                           title="Enter a valid employee ID (positive integer)."/>
                    <span class="hint">Positive employee ID</span>
                </label>

                <label>Month
                    <input name="month" type="number" required min="1" max="12" step="1" inputmode="numeric"
                           title="Month must be between 1 and 12."/>
                    <span class="hint">1 - 12</span>
                </label>

                <label>Year
                    <input name="year" type="number" required min="2000" max="2100" step="1" inputmode="numeric"
                           title="Year must be between 2000 and 2100."/>
                    <span class="hint">2000 - 2100</span>
                </label>

                <label>Basic
                    <input name="basicSalary" type="text" required inputmode="decimal"
                           pattern="^\d+(\.\d{1,2})?$" title="Non-negative number, up to 2 decimals. e.g. 250000 or 250000.50"/>
                    <span class="hint">LKR; up to 2 decimals</span>
                </label>

                <label>OT Rate
                    <input name="overtimeRate" type="text" inputmode="decimal"
                           pattern="^\d+(\.\d{1,2})?$" title="Non-negative number, up to 2 decimals."/>
                    <span class="hint">per hour; optional</span>
                </label>

                <label>Allowances
                    <input name="allowances" type="text" inputmode="decimal"
                           pattern="^\d+(\.\d{1,2})?$" title="Non-negative number, up to 2 decimals."/>
                    <span class="hint">optional</span>
                </label>

                <label>Deductions
                    <input name="deductions" type="text" inputmode="decimal"
                           pattern="^\d+(\.\d{1,2})?$" title="Non-negative number, up to 2 decimals."/>
                    <span class="hint">optional</span>
                </label>

                <button type="submit" class="btn primary">Generate / Update</button>
            </form>
        </section>

        <!-- Payroll table -->
        <section class="card">
            <div class="table-wrapper">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Emp</th>
                        <th>Period</th>
                        <th>Basic</th>
                        <th>Net Hours</th>
                        <th>OT</th>
                        <th>Gross</th>
                        <th>Net</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${list == null or #lists.isEmpty(list)}">
                        <td colspan="8">No payrolls yet.</td>
                    </tr>

                    <tr th:each="p : ${list}">
                        <td th:text="${p?.employee?.username} ?: '—'"></td>
                        <td th:text="${(p?.periodMonth != null ? p.periodMonth : '—') + ' / ' + (p?.periodYear != null ? p.periodYear : '—')}"></td>
                        <td th:text="${p?.basicSalary} ?: '0.00'"></td>
                        <td th:text="${p?.netHours} ?: '0.00'"></td>
                        <td th:text="${p?.overtimeHours} ?: '0.00'"></td>
                        <td th:text="${p?.grossSalary} ?: '0.00'"></td>
                        <td th:text="${p?.netSalary} ?: '0.00'"></td>
                        <td>
                            <a th:if="${p != null and p.id != null}"
                               th:href="@{'/admin/payrolls/' + ${p.id} + '/pdf'}"
                               class="btn ghost">PDF</a>
                            <a th:href="@{'/admin/payrolls/' + ${p.id} + '/edit'}" class="btn ghost">Edit</a>
                            <form th:action="@{'/admin/payrolls/' + ${p.id} + '/delete'}"
                                  method="post"
                                  style="display:inline">
                                <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}" />
                                <button type="submit" class="btn ghost"
                                        onclick="return confirm('Are you sure you want to delete this payroll record?')">
                                    Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="actions">
                <a th:href="@{/admin/employees}" class="btn ghost">Back</a>
            </div>
        </section>
    </main>
</div>

<!-- Error Popup -->
<div class="error-popup-overlay" id="errorOverlay" onclick="closeErrorPopup()"></div>
<div class="error-popup" id="errorPopup">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Validation Error</div>
    <div class="error-message" id="errorMessage"></div>
    <button class="error-close-btn" onclick="closeErrorPopup()">Got it</button>
</div>

<script>
    function showErrorPopup(message) {
        const popup = document.getElementById('errorPopup');
        const overlay = document.getElementById('errorOverlay');
        const messageEl = document.getElementById('errorMessage');

        messageEl.textContent = message;
        overlay.classList.add('show');
        popup.classList.add('show');
    }

    function closeErrorPopup() {
        const popup = document.getElementById('errorPopup');
        const overlay = document.getElementById('errorOverlay');

        overlay.classList.remove('show');
        popup.classList.remove('show');
    }

    function validatePayrollForm(form) {
        const moneyFields = ['basicSalary','overtimeRate','allowances','deductions'];
        const moneyRe = /^\d+(\.\d{1,2})?$/;

        // Check HTML5 validation first
        if (!form.checkValidity()) {
            // Check specific field validations
            const empId = form.elements['empId'];
            const month = form.elements['month'];
            const year = form.elements['year'];

            if (empId && empId.validity.valueMissing) {
                showErrorPopup('Employee ID is required!');
                empId.focus();
                return false;
            }
            if (empId && (empId.validity.rangeUnderflow || empId.value < 1)) {
                showErrorPopup('Employee ID must be a positive number (minimum 1).');
                empId.focus();
                return false;
            }

            if (month && month.validity.valueMissing) {
                showErrorPopup('Month is required!');
                month.focus();
                return false;
            }
            if (month && (month.validity.rangeUnderflow || month.value < 1)) {
                showErrorPopup('Month must be between 1 and 12.');
                month.focus();
                return false;
            }
            if (month && (month.validity.rangeOverflow || month.value > 12)) {
                showErrorPopup('Month must be between 1 and 12 (you entered ' + month.value + ').');
                month.focus();
                return false;
            }

            if (year && year.validity.valueMissing) {
                showErrorPopup('Year is required!');
                year.focus();
                return false;
            }
            if (year && (year.validity.rangeUnderflow || year.value < 2000)) {
                showErrorPopup('Year must be between 2000 and 2100.');
                year.focus();
                return false;
            }
            if (year && (year.validity.rangeOverflow || year.value > 2100)) {
                showErrorPopup('Year must be between 2000 and 2100 (you entered ' + year.value + ').');
                year.focus();
                return false;
            }

            return false;
        }

        // Check money field formats
        for (const name of moneyFields) {
            const el = form.elements[name];
            if (!el) continue;
            const v = el.value.trim();
            if (v === '') continue;

            if (!moneyRe.test(v)) {
                const fieldNames = {
                    'basicSalary': 'Basic Salary',
                    'overtimeRate': 'OT Rate',
                    'allowances': 'Allowances',
                    'deductions': 'Deductions'
                };
                showErrorPopup(fieldNames[name] + ' must be a non-negative number with up to 2 decimals. Example: 250000 or 250000.50');
                el.focus();
                return false;
            }
        }

        return true;
    }
</script>
</body>
</html>
